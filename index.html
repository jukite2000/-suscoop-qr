<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>수상한 QR | SUSCOOP</title>
  
  <!-- Fonts via Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=East+Sea+Dokdo&family=Gaegu:wght@700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --border-red: #c51921;
      --border-blue: #0d2a76;
      --thief-dark: #1d1f22;
      --thief-mid: #2d3135;
      --thief-face: #111214;
      --eye-red: #ff3333;
      --text-dark: #1a1a1a;
      --text-muted: #4a4a4a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f0f3f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Comic Sunburst rotating background to fill empty space */
    .sunburst-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200vmax;
      height: 200vmax;
      transform: translate(-50%, -50%);
      background: repeating-conic-gradient(
        from 0deg,
        #f0f3f8 0deg 8deg,
        #e2e8f0 8deg 16deg
      );
      opacity: 0.7;
      z-index: 1;
      pointer-events: none;
      animation: sunburst-rotate 180s linear infinite;
    }

    @keyframes sunburst-rotate {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Floating Comic Pop Art elements to decorate empty space */
    .pop-item {
      position: absolute;
      font-family: 'East Sea Dokdo', cursive;
      color: rgba(13, 42, 118, 0.15);
      z-index: 2;
      user-select: none;
      pointer-events: none;
    }

    .pop-item-1 {
      top: 15%;
      left: 12%;
      font-size: 5rem;
      transform: rotate(-15deg);
      animation: float-slow 4s infinite ease-in-out alternate;
    }

    .pop-item-2 {
      bottom: 20%;
      left: 15%;
      font-size: 6rem;
      color: rgba(197, 25, 33, 0.15);
      transform: rotate(20deg);
      animation: float-slow 5s infinite ease-in-out alternate-reverse;
    }

    .pop-item-3 {
      top: 20%;
      right: 15%;
      font-size: 7rem;
      color: rgba(197, 25, 33, 0.15);
      transform: rotate(10deg);
      animation: float-slow 4.5s infinite ease-in-out alternate;
    }

    .pop-item-4 {
      bottom: 15%;
      right: 12%;
      font-size: 5.5rem;
      transform: rotate(-25deg);
      animation: float-slow 5.2s infinite ease-in-out alternate-reverse;
    }

    @keyframes float-slow {
      0% { transform: translateY(0) rotate(-10deg); }
      100% { transform: translateY(-15px) rotate(15deg); }
    }

    /* Double Frame Outer Container */
    .outer-frame {
      border: 8px solid var(--border-red);
      padding: 10px;
      background: #ffffff;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.25),
        0 0 40px rgba(13, 42, 118, 0.05);
      border-radius: 4px;
      position: relative;
      width: 100%;
      max-width: 440px;
      z-index: 10;
      animation: frame-entrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Double Frame Inner Container */
    .inner-frame {
      border: 6px solid var(--border-blue);
      padding: 45px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
    }

    @keyframes frame-entrance {
      0% { transform: scale(0.94) translateY(20px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* Handcrafted Title style matching the brush font */
    .brush-title {
      font-family: 'East Sea Dokdo', cursive;
      font-size: 4.8rem;
      line-height: 1;
      color: var(--border-blue);
      margin-bottom: 28px;
      text-shadow: 3px 3px 0px rgba(197, 25, 33, 0.15);
      letter-spacing: -1px;
    }

    .brush-title span {
      color: var(--border-red);
    }

    /* Content Typography */
    .main-message {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--text-dark);
      margin-bottom: 20px;
      letter-spacing: -0.03em;
      word-break: keep-all;
    }

    .sub-message {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 40px;
      word-break: keep-all;
    }

    /* Thief character peeking from the side */
    .thief-peeker {
      position: absolute;
      right: -85px;
      top: 15%;
      width: 130px;
      height: 190px;
      z-index: 10;
      pointer-events: none;
      transform-origin: left center;
      animation: thief-wiggle 4s infinite ease-in-out;
    }

    @keyframes thief-wiggle {
      0%, 100% { transform: rotate(0deg) translateX(0); }
      50% { transform: rotate(4deg) translateX(-6px) translateY(2px); }
    }

    .thief-svg {
      width: 100%;
      height: 100%;
    }

    /* Pulsing glowing red eyes */
    .thief-eye {
      animation: eye-glow 2s infinite alternate ease-in-out;
    }

    @keyframes eye-glow {
      0% { fill: #ff3333; filter: drop-shadow(0 0 1px #ff3333); }
      100% { fill: #ff7777; filter: drop-shadow(0 0 6px #ff3333); }
    }

    /* Buttons layout */
    .button-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 20;
    }

    .btn {
      width: 100%;
      padding: 18px 24px;
      font-size: 1.15rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 8px;
      outline: none;
      letter-spacing: -0.02em;
    }

    /* Handcrafted bold solid buttons */
    .btn-yes {
      background-color: var(--border-blue);
      color: #ffffff;
      border: 3px solid var(--border-blue);
      box-shadow: 0 4px 0px #06153b;
    }

    .btn-yes:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0px #06153b;
    }

    .btn-yes:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0px #06153b;
    }

    .btn-no {
      background-color: #ffffff;
      color: var(--text-muted);
      border: 3px solid #d1d5db;
      box-shadow: 0 4px 0px #d1d5db;
    }

    .btn-no:hover {
      background-color: #f9fafb;
      color: var(--text-dark);
      border-color: #9ca3af;
      box-shadow: 0 6px 0px #9ca3af;
      transform: translateY(-2px);
    }

    .btn-no:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0px #9ca3af;
    }

    /* Fullscreen gate transition overlay */
    .gate-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .gate-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    /* Classic retro loading bar */
    .loading-container {
      width: 200px;
      height: 16px;
      border: 3px solid var(--border-blue);
      padding: 2px;
      background: white;
      margin-bottom: 16px;
    }

    .loading-bar {
      height: 100%;
      background: var(--border-red);
      width: 0%;
      transition: width 1.2s ease-in-out;
    }

    .loading-text {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--border-red);
      letter-spacing: -0.02em;
    }

    /* MOBILE OPTIMIZATIONS (Perfect fit for all smartphones without horizontal scroll) */
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      .outer-frame {
        max-width: 300px;
        border-width: 6px;
        padding: 6px;
      }
      .inner-frame {
        border-width: 4px;
        padding: 30px 15px;
      }
      .brush-title {
        font-size: 3.2rem;
        margin-bottom: 16px;
      }
      .main-message {
        font-size: 1.18rem;
        margin-bottom: 12px;
      }
      .sub-message {
        font-size: 0.95rem;
        margin-bottom: 24px;
      }
      .thief-peeker {
        right: -58px;
        width: 85px;
        height: 125px;
        top: 20%;
      }
      .btn {
        padding: 14px 18px;
        font-size: 1rem;
      }
      .pop-item {
        font-size: 2.2rem !important;
      }
      .pop-item-1 { top: 8%; left: 4%; }
      .pop-item-2 { bottom: 12%; left: 6%; }
      .pop-item-3 { top: 12%; right: 6%; }
      .pop-item-4 { bottom: 10%; right: 4%; }
    }
  </style>
</head>
<body>

  <!-- Comic Sunburst Background -->
  <div class="sunburst-bg"></div>

  <!-- Floating Pop Art texts in background to fill empty space -->
  <div class="pop-item pop-item-1">SUS!</div>
  <div class="pop-item pop-item-2">지갑조심!</div>
  <div class="pop-item pop-item-3">QR</div>
  <div class="pop-item pop-item-4">조심!</div>

  <!-- Card Frame -->
  <div class="outer-frame">
    
    <!-- Thief Peeking Character (SVG styled exactly like the cartoon thief) -->
    <div class="thief-peeker">
      <svg class="thief-svg" viewBox="0 0 120 180">
        <!-- Thief Body -->
        <path d="M 120,70 C 80,70 50,90 50,130 C 50,150 70,180 120,180 Z" fill="var(--thief-dark)" />
        <!-- Head / Beanie -->
        <circle cx="95" cy="65" r="32" fill="var(--thief-dark)" />
        <!-- Beanie trim fold -->
        <path d="M 62,75 Q 85,82 118,72 L 115,62 Q 85,72 65,65 Z" fill="var(--thief-mid)" />
        <!-- Face/Mask outline -->
        <path d="M 68,82 C 60,110 110,115 118,92 Z" fill="var(--thief-face)" />
        
        <!-- Glowing Red Evil Eyes -->
        <!-- Left eye -->
        <path d="M 74,78 Q 84,84 90,74 Q 82,72 74,78 Z" fill="var(--eye-red)" class="thief-eye" />
        <!-- Right eye -->
        <path d="M 108,78 Q 98,84 92,74 Q 100,72 108,78 Z" fill="var(--eye-red)" class="thief-eye" />
        
        <!-- Hands grabbing the card border -->
        <g fill="var(--thief-mid)" stroke="var(--thief-face)" stroke-width="1.5">
          <!-- Hand 1 (Grabbing edge) -->
          <circle cx="50" cy="100" r="6" />
          <circle cx="52" cy="108" r="6" />
          <circle cx="56" cy="116" r="6" />
          <!-- Hand 2 (Grabbing lower edge) -->
          <circle cx="50" cy="138" r="6" />
          <circle cx="52" cy="146" r="6" />
          <circle cx="56" cy="154" r="6" />
        </g>
      </svg>
    </div>

    <!-- Inner content area -->
    <div class="inner-frame">
      <!-- Calligraphy Brush Title -->
      <div class="brush-title">수상한 <span>QR</span></div>

      <!-- Main alert message -->
      <div class="main-message">잠깐! 당신의 지갑 조심하세요! 🚨</div>
      
      <!-- Sub message -->
      <div class="sub-message">그래도 입장하시겠습니까?</div>

      <!-- Clean Handcrafted Buttons -->
      <div class="button-container">
        <button class="btn btn-yes" id="btn-proceed">네! 들어가겠습니다 💳</button>
        <button class="btn btn-no" id="btn-cancel">아니오</button>
      </div>
    </div>
  </div>

  <!-- Loading gate transition screen -->
  <div class="gate-overlay" id="gate-overlay">
    <div class="loading-container">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
    <div class="loading-text">지갑 조심하세요!</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const targetUrl = 'https://smartstore.naver.com/suscoop?nl-ts-pid=jCMrAdqX5mhsslaJYbw-371836&tr=slsmn';

      // Proceed click handler
      document.getElementById('btn-proceed').addEventListener('click', () => {
        // Show retro loading gate transition screen
        const overlay = document.getElementById('gate-overlay');
        const bar = document.getElementById('loading-bar');
        
        overlay.classList.add('active');
        setTimeout(() => {
          bar.style.width = '100%';
        }, 50);

        // Redirect
        setTimeout(() => {
          window.location.href = targetUrl;
        }, 1300);
      });

      // Cancel button handler
      document.getElementById('btn-cancel').addEventListener('click', () => {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          alert('무사히 뒤로 돌아갑니다! 🛡️');
          window.location.href = 'about:blank';
        }
      });
    });
  </script>
</body>
</html>
